name: Periodic Checks

on:
  schedule:
    - cron: '0 6 * * 1' # Monday 6 AM UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run build
      - run: npm run e2e
        timeout-minutes: 10
